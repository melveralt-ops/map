<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Карта племени</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1e2a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Контейнер карты (делаем шире) */
        .map {
            width: 1400px;
            max-width: 95vw;
            position: relative;
            background-image: url('https://i.ibb.co/6czn3NfS/proba.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            border-radius: 32px;
            border: 3px solid #d4b87a;
            aspect-ratio: 16 / 9; /* широкоформатно */
        }

        /* Локация — квадратик */
        .location {
            position: absolute;
            width: 120px;
            cursor: pointer;
            transition: transform 0.2s;
            text-align: center;
            filter: drop-shadow(0 4px 6px black);
        }

        .location:hover {
            transform: scale(1.05);
        }

        /* Картинка внутри локации */
        .location img {
            width: 100%;
            border-radius: 20px;
            border: 3px solid #ffd966;
            background: #2c2118cc;
            backdrop-filter: blur(2px);
        }

        /* Название локации */
        .location span {
            display: block;
            background: #1f1a10cc;
            color: #ffefc0;
            font-size: 14px;
            padding: 4px;
            border-radius: 20px;
            margin-top: 6px;
            font-weight: bold;
        }

        /* Линия-стрелка */
        .line {
            position: absolute;
            background: no-repeat center;
            background-size: contain;
            pointer-events: none;
            z-index: 5;
        }

        /* Панель информации */
        .info-panel {
            margin-top: 20px;
            background: #1f2a15e6;
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 18px 24px;
            color: #f9f2da;
            max-width: 800px;
            width: 90%;
            text-align: center;
            border: 1px solid #dbb45c;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="map" id="mapContainer">
        <!-- СЮДА БУДУТ ДОБАВЛЯТЬСЯ ЛОКАЦИИ И ЛИНИИ -->
    </div>
    <div class="info-panel" id="infoPanel">
        <h3 id="infoTitle">🌍 Кликни на локацию</h3>
        <p id="infoDesc">Нажми на любой значок на карте</p>
    </div>
</div>

<script>
    // ========== ДАННЫЕ ЛОКАЦИЙ ==========
    const locationsData = {
        "пещера": {
            left: "10%",      // отступ слева (можно "200px", "15%")
            top: "20%",       // отступ сверху
            img: "cave.png",  // картинка локации (положите в репозиторий)
            name: "Пещера духов",
            desc: "Тёмный грот, где обитают предки. 🦇"
        },
        "костер": {
            left: "70%",
            top: "15%",
            img: "fire.png",
            name: "Священный костёр",
            desc: "Место ночных ритуалов. 🔥"
        },
        "река": {
            left: "50%",
            top: "70%",
            img: "river.png",
            name: "Река Жизни",
            desc: "Ловим рыбу и слушаем воду. 🐟"
        }
    };

    // ========== СТРЕЛКИ МЕЖДУ ЛОКАЦИЯМИ (ключ → куда) ==========
    const connections = [
        { from: "пещера", to: "костер" },
        { from: "костер", to: "река" },
        { from: "пещера", to: "река" }
    ];

    // ========== СОЗДАЁМ КАРТУ ==========
    const mapDiv = document.getElementById('mapContainer');
    const locationsRefs = {}; // сохраним ссылки на DOM-элементы

    // 1. Рисуем локации
    for (const [id, data] of Object.entries(locationsData)) {
        const locDiv = document.createElement('div');
        locDiv.className = 'location';
        locDiv.style.left = data.left;
        locDiv.style.top = data.top;
        locDiv.setAttribute('data-id', id);
        locDiv.setAttribute('data-name', data.name);
        locDiv.setAttribute('data-desc', data.desc);

        // картинка
        const img = document.createElement('img');
        img.src = data.img;
        img.alt = data.name;
        const span = document.createElement('span');
        span.innerText = data.name;

        locDiv.appendChild(img);
        locDiv.appendChild(span);

        // клик
        locDiv.addEventListener('click', () => {
            document.getElementById('infoTitle').innerHTML = `📍 ${data.name}`;
            document.getElementById('infoDesc').innerHTML = data.desc;
        });

        mapDiv.appendChild(locDiv);
        locationsRefs[id] = locDiv;
    }

    // 2. Рисуем линии (стрелки) ПОСЛЕ того, как локации появились на странице
    function drawLine(fromId, toId) {
        const fromEl = locationsRefs[fromId];
        const toEl = locationsRefs[toId];
        if (!fromEl || !toEl) return;

        const fromRect = fromEl.getBoundingClientRect();
        const toRect = toEl.getBoundingClientRect();
        const mapRect = mapDiv.getBoundingClientRect();

        // центр квадратика
        const fromX = fromRect.left + fromRect.width / 2 - mapRect.left;
        const fromY = fromRect.top + fromRect.height / 2 - mapRect.top;
        const toX = toRect.left + toRect.width / 2 - mapRect.left;
        const toY = toRect.top + toRect.height / 2 - mapRect.top;

        // длина и угол
        const dx = toX - fromX;
        const dy = toY - fromY;
        const length = Math.hypot(dx, dy);
        const angle = Math.atan2(dy, dx) * 180 / Math.PI;

        // создаём линию
        const line = document.createElement('div');
        line.className = 'line';
        line.style.width = `${length}px`;
        line.style.height = '4px';
        line.style.background = `linear-gradient(90deg, #ffaa44, #b87a2e)`;
        line.style.left = `${fromX}px`;
        line.style.top = `${fromY - 2}px`;
        line.style.transform = `rotate(${angle}deg)`;
        line.style.transformOrigin = '0 0';
        line.style.position = 'absolute';

        // наконечник стрелки
        line.style.backgroundImage = `url('data:image/svg+xml;utf8,<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 10 10\"><polygon points=\"0,0 10,5 0,10\" fill=\"%23ffaa44\"/></svg>')`;
        line.style.backgroundRepeat = 'no-repeat';
        line.style.backgroundPosition = 'right center';
        line.style.backgroundSize = '10px';

        mapDiv.appendChild(line);
    }

    // рисуем все связи
    setTimeout(() => {
        connections.forEach(conn => drawLine(conn.from, conn.to));
    }, 100); // маленькая задержка, чтобы браузер точно рассчитал позиции
</script>
</body>
</html>
