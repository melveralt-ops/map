<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта племени — Речные угодья</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #1a3a4a 0%, #0d2a38 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
            font-family: 'Segoe UI', 'Arial', system-ui;
        }

        /* Контейнер карты — фиксированный размер */
        .map-wrapper {
            position: relative;
            display: inline-block;
            width: 1739px;
            max-width: 95vw;
            border: 3px solid #7ab3c8;
            box-shadow: 0 20px 35px rgba(0,0,0,0.4);
            background: #2a5f6e;
        }

        .map-wrapper img {
            display: block;
            width: 100%;
            height: auto;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* Карточка локации */
        .location-card {
            position: absolute;
            cursor: pointer;
            pointer-events: auto;
            transition: transform 0.2s ease, filter 0.2s ease;
            filter: drop-shadow(0 4px 8px rgba(0, 20, 30, 0.5));
            z-index: 10;
            text-align: center;
            transform-origin: center center;
            display: flex;
            flex-direction: column;
            align-items: center;
            will-change: transform;
        }

        /* Более лёгкая анимация (без translateY для производительности) */
        .location-card:hover {
            transform: scale(1.08);
            filter: drop-shadow(0 8px 15px rgba(0, 30, 40, 0.6));
            z-index: 20;
        }

        /* Иконка локации — уменьшим до 120px для производительности */
        .location-icon {
            background: #1a4a58cc;
            backdrop-filter: blur(4px);
            border: 2px solid #8bcbd9;
            display: block;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: none;
            width: 120px;
            height: 120px;
            overflow: hidden;
        }

        .location-card:hover .location-icon {
            border-color: #ffd966;
            background: #1a5a6acc;
        }

        .location-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Контейнер для подписи и иконок действий */
        .label-actions-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 6px;
            flex-wrap: wrap;
        }

        .location-label {
            background: #0e3a46cc;
            backdrop-filter: blur(4px);
            padding: 4px 8px;
            font-size: 12px;
            font-weight: bold;
            color: #d4f1f9;
            border: 1px solid #6db0c2;
            white-space: nowrap;
            display: inline-block;
        }

        .action-icons {
            display: inline-flex;
            gap: 3px;
            align-items: center;
        }

        .action-icons span {
            background: #0e3a46aa;
            backdrop-filter: blur(4px);
            padding: 3px 5px;
            font-size: 11px;
            border: 1px solid #6db0c2;
            display: inline-flex;
            align-items: center;
            gap: 2px;
            color: #c8e7f0;
        }

        /* Попап — теперь absolute внутри .map-wrapper, привязан к карте */
        .popup {
            position: absolute;
            background: #133e48e6;
            backdrop-filter: blur(16px);
            border: 2px solid #7fc1d1;
            padding: 14px 18px;
            min-width: 250px;
            max-width: 320px;
            color: #e1f3f7;
            font-size: 13px;
            z-index: 1000;
            pointer-events: auto;
            box-shadow: 0 12px 28px rgba(0, 20, 25, 0.5);
            transition: opacity 0.2s;
            opacity: 0;
            visibility: hidden;
        }

        .popup.active {
            opacity: 1;
            visibility: visible;
        }

        .popup h4 {
            font-size: 17px;
            margin-bottom: 6px;
            color: #adeeff;
            border-left: 3px solid #48b5ca;
            padding-left: 10px;
        }

        .popup p {
            margin: 6px 0;
            line-height: 1.4;
        }

        .popup .actions-list {
            margin-top: 8px;
            padding-top: 6px;
            border-top: 1px solid #5b9aab;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            font-size: 11px;
        }

        .popup .actions-list span {
            background: #1e5f6e;
            padding: 3px 8px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .close-popup {
            position: absolute;
            top: 8px;
            right: 12px;
            background: none;
            border: none;
            color: #9fd3e0;
            font-size: 18px;
            cursor: pointer;
            pointer-events: auto;
            font-weight: bold;
            transition: color 0.2s;
        }

        .close-popup:hover {
            color: white;
        }
    </style>
</head>
<body>
<div class="map-wrapper">
    <img src="proba.png" usemap="#image-map" id="baseMap">
    <div class="overlay" id="overlayLayer"></div>

    <map name="image-map" id="imageMap">
        <area target="" alt="Шелестящий Тростник" title="Шелестящий Тростник" coords="759,540,523,306" shape="rect" data-id="trostnik">
        <area target="" alt="Лягушатник" title="Лягушатник" coords="830,305,1062,528" shape="rect" data-id="lyagush">
        <area target="" alt="Галечный берег" title="Галечный берег" coords="78,437,324,658" shape="rect" data-id="galec">
        <area target="" alt="Камышовые Заросли" title="Камышовые Заросли" coords="106,243,347,468" shape="rect" data-id="kamysh">
        <area target="" alt="Междуречье" title="Междуречье" coords="333,569,576,797" shape="rect" data-id="mezhdurech">
        <area target="" alt="Скользкие камни" title="Скользкие камни" coords="323,803,561,995" shape="rect" data-id="kamni">
        <area target="" alt="Торфяник" title="Торфяник" coords="1192,840,954,609" shape="rect" data-id="torf">
        <area target="" alt="Пруд ужей" title="Пруд ужей" coords="1193,609,1421,840" shape="rect" data-id="uzhi">
        <area target="" alt="Тёплый ручеёк" title="Тёплый ручеёк" coords="714,566,954,797" shape="rect" data-id="ruchey">
        <area target="" alt="Приток" title="Приток" coords="1148,854,1393,1098" shape="rect" data-id="pritok">
    </map>
</div>

<script>
    const locationsData = {
        trostnik: {
            name: "Шелестящий Тростник",
            desc: "Берег, заросший высоким камышом. Ветер создаёт мягкий шелест, успокаивающий душу. Красиво.",
            actions: ["💧 Питьё", "🐟 Охота на рыб", "🌿 Сбор трав"],
            actionIcons: ["💧", "🐟", "🌿"],
            iconImg: null
        },
        lyagush: {
            name: "Лягушатник",
            desc: "Тёплое мелководье, где квакают лягушки. Место безмятежности и влажной прохлады.",
            actions: ["🐸 Ловля лягушек", "🧪 Зельеварение", "🎵 Слушать кваканье"],
            actionIcons: ["🐸", "🧪", "🎵"],
            iconImg: null
        },
        galec: {
            name: "Галечный берег",
            desc: "Мелкая галька мягко шуршит под ногами. Вода здесь чистая и прозрачная.",
            actions: ["💎 Поиск самоцветов", "🚶 Медитация", "🏊 Купание"],
            actionIcons: ["💎", "🧘", "🏊"],
            iconImg: null
        },
        kamysh: {
            name: "Камышовые Заросли",
            desc: "Густые заросли камыша. Хорошее место для укрытия и наблюдения за водоплавающими.",
            actions: ["🎨 Плетение", "🦆 Охота на уток", "📸 Фотоохота"],
            actionIcons: ["🎨", "🦆", "📸"],
            iconImg: null
        },
        mezhdurech: {
            name: "Междуречье",
            desc: "Песчаная коса между двумя рукавами реки. Открывается вид на оба течения.",
            actions: ["🏕️ Привал", "🎣 Рыбалка", "🗺️ Изучение карт"],
            actionIcons: ["🏕️", "🎣", "🗺️"],
            iconImg: null
        },
        kamni: {
            name: "Скользкие камни",
            desc: "Валуны, покрытые мхом и тиной. Требуют осторожности, но дарят ощущение единения с водой.",
            actions: ["⚡ Испытание ловкости", "📿 Сбор мха", "💦 Испить воду"],
            actionIcons: ["⚡", "📿", "💦"],
            iconImg: null
        },
        torf: {
            name: "Торфяник",
            desc: "Мягкая торфяная почва с ароматом древних трав. Энергетически чистое место.",
            actions: ["🕯️ Ритуалы", "🌱 Сбор торфа", "😴 Сон на мху"],
            actionIcons: ["🕯️", "🌱", "😴"],
            iconImg: null
        },
        uzhi: {
            name: "Пруд ужей",
            desc: "Заводи, где греются на солнце ужи. Они неопасны и приносят удачу.",
            actions: ["🐍 Наблюдение", "🍃 Сбор трав", "🎋 Создание оберегов"],
            actionIcons: ["🐍", "🍃", "🎋"],
            iconImg: null
        },
        ruchey: {
            name: "Тёплый ручеёк",
            desc: "Медленный ручей с приятно тёплой водой даже в прохладный день. Красноягодка пыталась утопить здесь Пузатого Змея. К сожалению, большое пузо все время выталкивало кота на поверхность. Красноягодка ушла, а Пузатый Змей так и остался на месте. Решил помыться. А еще тут можно плавать.",
            actions: ["💆 Моющийся Пузатый Змей", "🍓 Красноягодка", "💦 Плавательная локация"],
            actionIcons: ["💆", "🍓", "💦"],
            iconImg: "https://i.ibb.co/bMspmYnv/Tonkiy-Rucheyok-okonchatelnaya-versia-na-21042026-kopia-3.png"
        },
        pritok: {
            name: "Приток",
            desc: "Тихая заводь, куда впадает малый ручей. Идеально для размышлений в одиночестве.",
            actions: ["🧘 Медитация", "📖 Чтение", "🎶 Игра на флейте"],
            actionIcons: ["🧘", "📖", "🎶"],
            iconImg: null
        }
    };

    function getLocationCardHtml(locationId) {
        const data = locationsData[locationId];
        if (!data) return '<div>?</div>';

        let iconHtml = '';
        if (data.iconImg) {
            iconHtml = `<img src="${data.iconImg}">`;
        } else {
            const defaultEmoji = {
                trostnik: "🌾", lyagush: "🐸", galec: "🪨", kamysh: "🌿",
                mezhdurech: "💧", kamni: "🪨", torf: "🪵", uzhi: "🐍",
                ruchey: "💦", pritok: "🏞️"
            };
            iconHtml = `<div style="font-size: 44px; line-height: 1; display: flex; align-items: center; justify-content: center; height: 100%;">${defaultEmoji[locationId] || "📍"}</div>`;
        }
        
        const actionsHtml = data.actionIcons.map(icon => `<span>${icon}</span>`).join('');
        
        return `
            <div class="location-icon">
                ${iconHtml}
            </div>
            <div class="label-actions-wrapper">
                <span class="location-label">${data.name}</span>
                <div class="action-icons">
                    ${actionsHtml}
                </div>
            </div>
        `;
    }

    // Попап теперь внутри .map-wrapper
    let popup = null;

    function createPopup() {
        const wrapper = document.querySelector('.map-wrapper');
        const div = document.createElement('div');
        div.className = 'popup';
        div.innerHTML = `
            <button class="close-popup">✖</button>
            <h4></h4>
            <p></p>
            <div class="actions-list"></div>
        `;
        wrapper.appendChild(div);
        return div;
    }

    const areas = document.querySelectorAll('#imageMap area');
    const overlay = document.getElementById('overlayLayer');
    const mapImg = document.getElementById('baseMap');
    let popupCreated = false;

    function showPopupNear(card, locationId, mapRect) {
        if (!popupCreated) {
            popup = createPopup();
            popupCreated = true;
            
            const closeBtn = popup.querySelector('.close-popup');
            closeBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                popup.classList.remove('active');
            });
            
            document.body.addEventListener('click', (e) => {
                if (!popup.contains(e.target) && !e.target.closest('.location-card')) {
                    popup.classList.remove('active');
                }
            });
        }
        
        const data = locationsData[locationId];
        if (!data) return;

        popup.querySelector('h4').innerHTML = `💧 ${data.name}`;
        popup.querySelector('p').innerHTML = data.desc;
        const actionsContainer = popup.querySelector('.actions-list');
        actionsContainer.innerHTML = data.actions.map(action => `<span>${action}</span>`).join('');
        
        // Получаем позицию карточки относительно map-wrapper
        const cardRect = card.getBoundingClientRect();
        const wrapperRect = document.querySelector('.map-wrapper').getBoundingClientRect();
        
        // Вычисляем позицию попапа относительно wrapper
        let top = cardRect.top - wrapperRect.top + (cardRect.height / 2) - 100;
        let left = cardRect.right - wrapperRect.left + 15;
        
        // Если не влезает справа — показываем слева
        if (left + 320 > wrapperRect.width) {
            left = cardRect.left - wrapperRect.left - 320 - 15;
        }
        
        // Корректировка границ
        if (top < 10) top = 10;
        if (top + 260 > wrapperRect.height) {
            top = wrapperRect.height - 270;
        }
        
        popup.style.top = `${top}px`;
        popup.style.left = `${left}px`;
        popup.classList.add('active');
    }

    function createLocationCards() {
        overlay.innerHTML = '';
        if (popup) popup.classList.remove('active');
        
        const updateCards = () => {
            const naturalWidth = mapImg.naturalWidth;
            const naturalHeight = mapImg.naturalHeight;
            if (!naturalWidth || !naturalHeight) return;
            
            const currentRect = mapImg.getBoundingClientRect();
            const scaleX = currentRect.width / naturalWidth;
            const scaleY = currentRect.height / naturalHeight;
            
            areas.forEach(area => {
                const coords = area.getAttribute('coords').split(',').map(Number);
                if (coords.length !== 4) return;
                let [x1, y1, x2, y2] = coords;
                
                // Преобразуем координаты из image-map в пиксели на экране
                let leftPx = x1 * scaleX;
                let topPx = y1 * scaleY;
                let rightPx = x2 * scaleX;
                let bottomPx = y2 * scaleY;
                
                let centerX = (leftPx + rightPx) / 2;
                let centerY = (topPx + bottomPx) / 2;
                
                const locationId = area.getAttribute('data-id');
                if (!locationId || !locationsData[locationId]) return;
                
                const card = document.createElement('div');
                card.className = 'location-card';
                // Ширина карточки 120px, смещение -60
                card.style.left = `${centerX - 60}px`;
                card.style.top = `${centerY - 70}px`;
                card.style.width = 'auto';
                
                card.innerHTML = getLocationCardHtml(locationId);
                
                const mapRect = currentRect;
                card.addEventListener('click', (e) => {
                    e.stopPropagation();
                    showPopupNear(card, locationId, mapRect);
                });
                
                overlay.appendChild(card);
            });
        };
        
        if (mapImg.complete) {
            updateCards();
        } else {
            mapImg.onload = updateCards;
        }
    }
    
    createLocationCards();
    
    window.addEventListener('resize', () => {
        createLocationCards();
        if (popup) popup.classList.remove('active');
    });
</script>
</body>
</html>
